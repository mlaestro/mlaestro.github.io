
<!DOCTYPE html>
<html>
<head>
<title>@proudbookreader</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="assets/book_icon.png" type="image/png">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
<link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Roboto'>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>
html,body,h1,h2,h3,h4,h5,h6 {font-family: "Roboto", sans-serif}
body { margin: 0; }
body.dark-theme {
  background-color: #000 !important;
  color: #fff;
}
body.dark-theme .w3-white {
  background-color: #1a1a1a !important;
  color: #fff;
}
body.dark-theme .w3-card,
body.dark-theme .w3-card-4 {
  background-color: #1a1a1a !important;
  color: #fff;
}
body.dark-theme .w3-text-grey {
  color: #ccc !important;
}
body.dark-theme .w3-opacity {
  color: #ccc;
}
body.dark-theme .w3-light-grey {
  background-color: #333 !important;
}
body.dark-theme .w3-container {
  color: #fff;
}
body.dark-theme .w3-blue {
  background-color: #1a5f99 !important;
}
body.dark-theme .fa {
  color: #fff;
}
.topnav {
  overflow: hidden;
  background-color: #2196F3;
  width: 100%;
}
body.dark-theme .topnav {
  background-color: #0d47a1 !important;
}

.nav-content {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 0 8px;
}

.topnav a {
  color: #f2f2f2;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
  font-size: 17px;
  display: block;
}

.topnav a:hover {
  background-color: #ddd;
  color: rgb(41, 16, 97);
}

.topnav a.active {
  background-color: #12023f;
  color: white;
}

.theme-toggle {
  background-color: #fff;
  border: none;
  color: #2196F3;
  padding: 14px 16px;
  text-align: center;
  text-decoration: none;
  font-size: 17px;
  cursor: pointer;
  border-radius: 4px;
  font-weight: bold;
  margin-left: auto;
}
body.dark-theme .theme-toggle {
  background-color: #f2f2f2;
  color: #0d47a1;
}
.theme-toggle:hover {
  opacity: 0.8;
}.resume-download {
  background-color: #fff !important;
  color: #2196F3 !important;
}
.resume-download:hover {
  background-color: #fff !important;
  color: #0d47a1 !important;
}
.name-title {
  color: #fff;
  text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
}
.book-item {
  border-bottom: 1px solid #eee;
  padding-bottom: 12px;
  margin-bottom: 12px;
}
body.dark-theme .book-item {
  border-color: #444;
}
</style>
</head>
<body class="w3-light-grey">
    <div class="topnav">
      <div class="nav-content">
        <a href="index.html">About Me</a>
        <a href="#contact">Contact</a>
        <a class="active" href="books.html">Books</a>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
      </div>
    </div>




<!-- Page Container -->
<div class="w3-content w3-margin-top" style="max-width:1400px;">

  <!-- The Grid -->
  <div class="w3-row-padding">
  
    <!-- Right Column -->
    <div class="w3-container" style="max-width: 900px; margin: 0 auto;">

      <div class="w3-container w3-card w3-white w3-margin-bottom">
        <h2 class="w3-text-grey w3-padding-16"><i class="fa fa-book fa-fw w3-margin-right w3-xxlarge w3-text-blue"></i>Books I&apos;ve Read in 2026</h2>
        <div id="books-list" class="w3-container"></div>
      </div>

    <!-- End Right Column -->
    </div>
    
  <!-- End Grid -->
  </div>
  
  <!-- End Page Container -->
</div>



<footer id="contact" class="w3-container w3-blue w3-center w3-margin-top">
  <p>Follow my reading journey.</p>
  <a href="https://www.instagram.com/proudbookreader" target="_blank" class="w3-hover-opacity"><i class="fa fa-instagram"></i></a>
  <p>Powered by <a href="https://www.w3schools.com/w3css/default.asp" target="_blank">w3.css</a></p>
</footer>

<script>
  async function renderBooks() {
    const container = document.getElementById('books-list');
    if (!container) return;

    try {
      const response = await fetch('data/books_2026.json');
      if (!response.ok) throw new Error('Failed to load books data');
      const books = await response.json();

      container.innerHTML = books.map((book) => {
        const stars = '★'.repeat(Math.round(book.rating)) + '☆'.repeat(5 - Math.round(book.rating));
        return `
          <div class="book-item">
            <h5 class="w3-opacity"><b>${book.title}</b></h5>
            <p><strong>Author:</strong> ${book.author}</p>
            <p><strong>My Rating:</strong> <span class="w3-text-amber">${stars}</span></p>
          </div>
        `;
      }).join('');
    } catch (error) {
      container.innerHTML = '<p>Unable to load books right now.</p>';
      console.error(error);
    }
  }

  function toggleTheme() {
    const body = document.body;
    const isDark = body.classList.toggle('dark-theme');
    const toggle = document.querySelector('.theme-toggle');
    const avatar = document.getElementById('avatar');
    if (avatar) avatar.src = isDark ? 'assets/avatar_dark.png' : 'assets/avatar.jpg';
    if (toggle) {
      toggle.textContent = isDark ? '☀️' : '🌙';
    }
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderBooks();
    const savedTheme = localStorage.getItem('theme');
    const toggle = document.querySelector('.theme-toggle');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-theme');
      const avatar = document.getElementById('avatar');
      if (avatar) avatar.src = 'assets/avatar_dark.png';
      if (toggle) toggle.textContent = '☀️';
    } else if (toggle) {
      toggle.textContent = '🌙';
    }
  });
</script>
</body>
</html>
